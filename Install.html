};
  function parseDateManual(dt){
  if(!dt || dt==="NA") return null;

  let parts = dt.split(" ");
  if(parts.length < 2) return null;

  // ✅ Replace "/" with "-" (IMPORTANT FIX)
  let datePart = parts[0].replace(/\//g, "-");

  let d = datePart.split("-");
  let t = parts[1].split(":");

  if(d.length < 3 || t.length < 2) return null;

  // ✅ Handle both formats: dd-mm-yyyy AND yyyy-mm-dd
  let year, month, day;

  if(d[0].length === 4){
    // yyyy-mm-dd
    year = d[0];
    month = d[1];
    day = d[2];
  } else {
    // dd-mm-yyyy
    day = d[0];
    month = d[1];
    year = d[2];
  }

  return new Date(
    year,
    month - 1,
    day,
    t[0],
    t[1]
  );
}

let CURRENT_USER={}, LAST_SHUTDOWN_TIME={}, LAST_RESUME_DATA=null;

// ================= FEEDERS =================
function populateFeeders(){
  let list = FEEDERS[CURRENT_USER.i] || FEEDERS.ALL;

  let sd = document.getElementById("sd_feeder");
  let rs = document.getElementById("rs_feeder");

  sd.innerHTML = "";
  rs.innerHTML = "";

    rs.innerHTML += `<option>${f}</option>`;
  });

// ✅ ACTIVE SHUTDOWN
function loadActiveShutdowns(){
 LAST_SHUTDOWN_TIME={};

 fetch(CSV_URL+"&t="+Date.now())
 .then(r=>r.text())
 .then(t=>{
  const rows=t.split("\n").map(r=>r.split(",").map(x=>x.replace(/"/g,"").trim()));
  const h=rows.shift().map(x=>x.toUpperCase());

  const i={
   feeder:h.findIndex(x=>x.includes("FEEDER")),
   sd:h.findIndex(x=>x.includes("SHUTDOWN")),
   rs:h.findIndex(x=>x.includes("RESUME")),
   inst:h.findIndex(x=>x.includes("INSTALL")),
   type:h.findIndex(x=>x.includes("TYPE"))
  };

  activeShutdowns.innerHTML="";
  let count=0;

  rows.forEach(r=>{
   const feeder=r[i.feeder];
   const sdTime=r[i.sd];
   const rsTime=r[i.rs];
   const inst=r[i.inst];
   const type=r[i.type];

   if(!rsTime || rsTime==="NA"){
    if(!CURRENT_USER.admin && inst!==CURRENT_USER.i) return;

    LAST_SHUTDOWN_TIME[feeder]=sdTime;
    count++;

    activeShutdowns.innerHTML+=`
<div class="shutdown-item">
  <div class="shutdown-row"><span class="shutdown-label">FEEDER</span><span class="shutdown-value">${feeder}</span></div>
  <div class="shutdown-row"><span class="shutdown-label">TYPE</span><span class="shutdown-value">${type}</span></div>

</div>`;
   }
  });

  }
 });
}

// ✅ SHUTDOWN
function submitShutdown(){
 if(!sd_feeder.value||!sd_time.value||!sd_type.value||!sd_info.value){
  showMsg("All Shutdown fields required");return;
 }
 if(hasSpecialChar(sd_info.value)){showMsg("❌ Invalid characters");return;}
 if(LAST_SHUTDOWN_TIME[sd_feeder.value]){showMsg("Already shutdown");return;}

 fetch(WEBAPP_URL+"?"+new URLSearchParams({
  action:"shutdown",
  feeder:sd_feeder.value,
  ShutdownTime:sd_time.value.replace("T"," "),
  ShutdownType:sd_type.value,
  Information:sd_info.value.toUpperCase(),
  ShutdownEntryBy:CURRENT_USER.n,
  Installation:CURRENT_USER.i
 }),{mode:"no-cors"});

 showMsg("Shutdown Submitted");
 backToMain();
}

// ✅ RESUME
function submitResume(){
 if(!rs_feeder.value||!rs_time.value||!rs_loss.value||!rs_dg.value||!rs_rem.value){
  showMsg("All fields required");return;
 }
 if(hasSpecialChar(rs_rem.value)){showMsg("❌ Invalid characters");return;}

 if(!LAST_SHUTDOWN_TIME[rs_feeder.value]){
  showMsg("Feeder not found");return;
 }

 fetch(WEBAPP_URL+"?"+new URLSearchParams({
  action:"resume",
  feeder:rs_feeder.value,
  ResumeTime:rs_time.value.replace("T"," "),
  ResumeEntryBy:CURRENT_USER.n,
  TotalProdLoss:rs_loss.value,
  DGDeployed:rs_dg.value,

 }),{mode:"no-cors"});

// ✅ HISTORY
function formatDateTime(dt){
  let d = parseDateManual(dt);
  if(!d) return "-";

  let day = String(d.getDate()).padStart(2,'0');
  let mon = String(d.getMonth()+1).padStart(2,'0');
  let yr  = d.getFullYear();
  let hr  = String(d.getHours()).padStart(2,'0');
  let min = String(d.getMinutes()).padStart(2,'0');

  return `${day}-${mon}-${yr} ${hr}:${min}`;
}
function formatHrs(val){

  if(!val || val === "NA") return "0 Hrs and 0 Min";

  // agar already correct format hai
  if(typeof val === "string" && val.includes("Hrs")){
    return val;
  }

  return val; // fallback
}

   let startCurrentMonth = new Date(now.getFullYear(), now.getMonth(), 1);

   // ✅ PREVIOUS MONTH 1st
   let startPrevMonth = new Date(now.getFullYear(), now.getMonth()-1, 1);

   // ✅ FILTER RANGE = previous month 1st se ab tak
   let startDate = startPrevMonth;

   rows.forEach(r => {

     const feeder = r[i.feeder];
     const sd     = r[i.sd];
     const rs     = r[i.rs];
     const type   = r[i.type];
     const inst   = r[i.inst];
    const hrs = r[i.hrs]; // direct string lo
     const loss   = parseFloat(r[i.loss]) || 0;

     if(!feeder || !sd) return;

    let sdDate = parseDateManual(sd);
if(!sdDate) return;

if(startDate && sdDate < startDate) return;

    // ✅ NON ADMIN → only own installation
if(!CURRENT_USER.admin && inst !== CURRENT_USER.i) return;

// ✅ ADMIN → apply filter only if not ALL
if(CURRENT_USER.admin && filter !== "ALL" && inst !== filter) return;

     data.push({
       feeder,
       sdDate,
       sd,
       rs,
       type,
       inst,
       hrs,
       loss
     });

   });

   // ✅ SORT LATEST FIRST (IMPORTANT FIX)
   data.sort((a,b)=> b.sdDate - a.sdDate);

   let html = "";

   data.forEach(d=>{
     html += `
     <tr style="border-bottom:1px solid #ddd;">
       <td>${d.feeder}</td>
       <td>${formatDateTime(d.sd)}</td>
       <td>${formatDateTime(d.rs)}</td>
       <td>${d.type}</td>
       <td>${formatHrs(d.hrs)}</td>
       <td>${d.loss}</td>
       <td>${d.inst}</td>
     </tr>`;
   });

   document.querySelector("#historyTable tbody").innerHTML =
     html || `<tr><td colspan="7">No Data (Last 2 Months)</td></tr>`;

 });
}

 loadActiveShutdowns();

function checkExportButton(){
  let from = document.getElementById("fromDateTime").value;
  let to   = document.getElementById("toDateTime").value;

  document.getElementById("exportBtn").disabled = !(from && to);
}

// ✅ Event listeners
document.getElementById("fromDateTime").addEventListener("change", checkExportButton);
document.getElementById("toDateTime").addEventListener("change", checkExportButton);
function exportPDF(){

  let from = document.getElementById("fromDateTime").value;
  let to   = document.getElementById("toDateTime").value;

  if(!from || !to){
    showMsg("Select From & To Date Time");
    return;
  }

  let fromD = parseDateManual(from.replace("T"," "));
let toD   = parseDateManual(to.replace("T"," "));

  fetch(CSV_URL + "&t=" + Date.now())
  .then(r=>r.text())
  .then(t=>{

    const rows = t.split("\n").map(r => r.split(",").map(x => x.replace(/"/g,"").trim()));
    const h = rows.shift().map(x => x.toUpperCase());

    const i = {
      feeder: h.findIndex(x => x.includes("FEEDER")),
      sd:     h.findIndex(x => x.includes("SHUTDOWN")),
      rs:     h.findIndex(x => x.includes("RESUME")),
      type:   h.findIndex(x => x.includes("TYPE")),
      inst:   h.findIndex(x => x.includes("INSTALL")),
      hrs:    h.findIndex(x => x.includes("HRS")),
      loss:   h.findIndex(x => x.includes("LOSS")),
      dg:     h.findIndex(x => x.includes("DG")) // ✅ NEW
    };

   let filter = "ALL";

if(CURRENT_USER.admin){
  filter = document.getElementById("historyFilter").value;
}else{
  filter = CURRENT_USER.i;
}

    let summary = {};
    let grand = {min:0, loss:0, dg:0}; // ✅ GRAND TOTAL

    let html = `
    <h2 style="text-align:center;">POWER SHUTDOWN REPORT</h2>
    <p style="text-align:center;">
  From ${formatDateTime(from.replace("T"," "))} 
  To ${formatDateTime(to.replace("T"," "))}<br>
  Installation: ${filter}
</p>

    <table border="1" cellspacing="0" cellpadding="6" width="100%" style="text-align:center;">
    <tr>
      <th>Feeder</th>
      <th>Shutdown</th>
      <th>Resume</th>
      <th>Type</th>
      <th>Hrs and Min</th>
      <th>Loss - Ton</th>
      <th>DG Deployed</th>
      <th>Installation</th>
    </tr>`;

    rows.forEach(r=>{

  const feeder = r[i.feeder];
  const sd     = r[i.sd];
  const rs     = r[i.rs];
  const type   = r[i.type];
  const inst   = r[i.inst]; // ✅ YEH UPAR HONA CHAHIYE
  const hrsStr = r[i.hrs];
  const loss   = parseFloat(r[i.loss]) || 0;
  const dg     = parseFloat(r[i.dg]) || 0;

  if(!feeder || !sd) return;

  let sdDate = parseDateManual(sd);
  if(!sdDate) return;

  // ✅ AB USE KARO
  if(!CURRENT_USER.admin && inst !== CURRENT_USER.i) return;
  if(CURRENT_USER.admin && filter !== "ALL" && inst !== filter) return;

  if(sdDate < fromD || sdDate > toD) return;

      // ✅ Hrs convert to minutes
      let totalMin = 0;

if(hrsStr && hrsStr !== "NA"){
  let match = hrsStr.match(/(\d+)\s*Hrs\s*(?:and)?\s*(\d+)\s*Min/i);

  if(match){
    let h = parseInt(match[1]) || 0;
    let m = parseInt(match[2]) || 0;
    totalMin = (h * 60) + m;
  }
}

      // ✅ FEEDER SUMMARY
      if(!summary[feeder]){
        summary[feeder] = {min:0, loss:0, dg:0};
      }

      summary[feeder].min += totalMin;
      summary[feeder].loss += loss;
      summary[feeder].dg += dg;

      // ✅ GRAND TOTAL
      grand.min += totalMin;
      grand.loss += loss;
      grand.dg += dg;

      html += `
      <tr>
        <td>${feeder}</td>
        <td>${formatDateTime(sd)}</td>
        <td>${formatDateTime(rs)}</td>
        <td>${type}</td>
        <td>${formatHrs(hrsStr)}</td>
        <td>${loss}</td>
        <td>${dg}</td>
        <td>${inst}</td>
      </tr>`;
    });

    html += "</table>";

    // ✅ FEEDER SUMMARY TABLE
    html += `
    <h3 style="text-align:center;margin-top:20px;">FEEDER WISE SUMMARY</h3>
    <table border="1" cellspacing="0" cellpadding="6" width="100%" style="text-align:center;">
    <tr>
      <th>Feeder</th>
      <th>Total Shutdown Hrs</th>
      <th>Total Loss (Ton)</th>
      <th>Total DG</th>
    </tr>`;

    Object.keys(summary).forEach(f=>{

      let totalMin = summary[f].min;
      let hrs = Math.floor(totalMin/60);
      let min = totalMin%60;

      html += `
      <tr>
        <td>${f}</td>
        <td>${hrs} Hrs ${min} Min</td>
        <td>${summary[f].loss.toFixed(2)}</td>
        <td>${summary[f].dg}</td>
      </tr>`;
    });

    html += "</table>";

    // ✅ SAFETY FIX (ADD THIS LINE)
if(isNaN(grand.min)) grand.min = 0;

// ✅ GRAND TOTAL
let gHrs = Math.floor(grand.min/60);
let gMin = grand.min%60;

    html += `
    <h3 style="text-align:center;margin-top:20px;">GRAND TOTAL</h3>
    <table border="1" cellspacing="0" cellpadding="6" width="100%" style="text-align:center;">
    <tr>
      <th>Total Shutdown</th>
      <th>Total Loss (Ton)</th>
      <th>Total DG</th>
    </tr>
    <tr>
      <td>${gHrs} Hrs ${gMin} Min</td>
      <td>${grand.loss.toFixed(2)}</td>
      <td>${grand.dg}</td>
    </tr>
    </table>`;

    let win = window.open("", "_blank");
    win.document.write(html);
    win.document.close();
    win.print();

  });
}

  localStorage.removeItem("CURRENT_USER");
  window.location.href = "index.html";
}
