<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POWER SHUTDOWN MANAGEMENT APP - AREA-IV</title>

<style>
/* ===== GLOBAL ===== */
body{
  font-family:"Segoe UI",Roboto,Arial;
  background:#f1f3f6;
  margin:0;
}

/* ===== HEADER ===== */
header{
  background:#1f3a5f;
  color:#fff;
  padding:14px 18px;
  font-size:18px;
  font-weight:600;
  text-align:center;
}

/* ===== CONTAINER ===== */
.container{
  max-width:520px;
  margin:auto;
  padding:16px;
}

/* ===== CARD ===== */
.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

/* ===== HEADINGS ===== */
h2{
  font-size:16px;
  color:#1f3a5f;
  text-align:center;
}
h3{
  font-size:15px;
  color:#1f3a5f;
  text-align:center;
  margin-bottom:10px;
}

/* ===== INPUTS ===== */
input,
select,
textarea{
  width:100%;
  height:48px;
  padding:0 14px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #cfd1d4;
  font-size:15px;
  box-sizing:border-box;
  outline:none;
  transition:0.2s;
}

textarea{
  height:90px;
  padding:10px 14px;
  resize:none;
}

/* FOCUS */
input:focus,
select:focus,
textarea:focus{
  border-color:#1f3a5f;
  box-shadow:0 0 0 2px rgba(31,58,95,0.1);
}

/* ===== BUTTON ===== */
button{
  width:100%;
  height:50px;
  margin-top:14px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  background:#1f3a5f;color:#fff;
}

/* BUTTON COLORS */
.btn-login{background:#1f3a5f;color:#fff;}
.btn-login:hover{background:#16304d;}


/* ===== MESSAGE ===== */
#msg{
  text-align:center;
  margin-top:10px;
  font-weight:600;
  color: red; 
}
/* ==========================================
   POWER SHUTDOWN APP - MOBILE LOGIN UI
========================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    min-height:100%;
    font-family:"Segoe UI",Roboto,Arial,sans-serif;
    background:#eef3f8;
    overflow-x:hidden;
}

/* HEADER */

header{
    width:100%;
    min-height:85px;
    background:#1f3a5f;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:18px;
    font-size:30px;
    font-weight:800;
    line-height:1.25;
    box-shadow:0 6px 18px rgba(0,0,0,.20);
}

/* CONTAINER */

.container{
    width:100%;
    max-width:100%;
    padding:20px;
}

/* LOGIN CARD */

.card{
    width:100%;
    max-width:550px;
    margin:auto;
    background:#fff;
    border-radius:24px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

/* LOGO */

.card img{
    width:160px;
    display:block;
    margin:0 auto 20px;
}

/* HEADING */

h2{
    text-align:center;
    color:#1f3a5f;
    font-size:30px;
    font-weight:800;
    margin-bottom:25px;
}

/* INPUT */

input{
    width:100%;
    height:68px;
    padding:0 20px;
    margin-top:18px;
    border:2px solid #d6d6d6;
    border-radius:18px;
    font-size:24px;
    background:#fafafa;
    outline:none;
    transition:.25s;
}

input:focus{
    border-color:#1f3a5f;
    background:#fff;
    box-shadow:0 0 0 4px rgba(31,58,95,.12);
}

/* BUTTON */

button{
    width:100%;
    height:68px;
    margin-top:24px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,#1f3a5f,#2f6db7);
    color:#fff;
    font-size:24px;
    font-weight:800;
    cursor:pointer;
}

button:hover{
    transform:translateY(-2px);
}

button:active{
    transform:scale(.98);
}

/* MESSAGE */

#msg{
    margin-top:20px;
    text-align:center;
    font-size:22px;
    font-weight:700;
}

.success{
    color:#16a34a;
}

.error{
    color:#dc2626;
}

/* USER CARD */

#userInfo{
    width:calc(100% - 20px);
    max-width:550px;
    margin:15px auto;
    background:#fff;
    border-radius:20px;
    padding:20px;
    box-shadow:0 6px 18px rgba(0,0,0,.10);
    text-align:center;
}

#ui_name{
    font-size:28px !important;
    font-weight:800 !important;
    color:#1f3a5f;
}

#ui_inst{
    margin-top:6px;
    font-size:22px !important;
    color:#555;
    font-weight:600;
}

/* MOBILE */

@media (max-width:768px){

header{
    font-size:24px;
    min-height:80px;
    padding:16px;
}

.container{
    padding:16px;
}

.card{
    padding:24px;
    border-radius:20px;
}

.card img{
    width:140px;
}

h2{
    font-size:26px;
}

input{
    height:62px;
    font-size:22px;
}

button{
    height:62px;
    font-size:22px;
}

#msg{
    font-size:20px;
}

#ui_name{
    font-size:24px !important;
}

#ui_inst{
    font-size:20px !important;
}

}
</style>

</head>

<body>
<header>POWER SHUTDOWN MANAGEMENT APP - AREA-IV</header>
<div id="userInfo" class="hidden" style="
  background:#ffffff;
  margin:10px 16px;
  padding:10px 14px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.06);
  text-align:center;
">
  <div style="font-size:15px;font-weight:700;color:#1f3a5f" id="ui_name"></div>
  <div style="font-size:13px;color:#6b7280" id="ui_inst"></div>
</div>

<div class="container">

<div class="card" id="loginBox">

<!-- ONGC LOGO -->
<div style="text-align:center;margin-bottom:12px;">
  <img 
    src="Logo.png"
    alt="ONGC Logo"
    style="
      width:120px;
      background:#fff;
      padding:8px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,.15);
    ">
</div>
<div class="card">
  <h2>🔐 USER LOGIN</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">LOGIN</button>

  <div id="msg"></div>
</div>
<script>

// 🔴 YOUR WEB APP URL
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxOab-F4NRpKAnewVWXH1XQNdSHnfd2x5X2pKKp5FlcXB1DvhGvgQz6MXL7MwX9A2Rk/exec";

// ========= LOGIN =========
function login(){

  let username = document.getElementById("username").value.trim();
  let password = document.getElementById("password").value.trim();

  if(!username || !password){
    showMsg("Enter Username & Password","error");
    return;
  }

  showMsg("Checking...","");

  fetch(WEBAPP_URL + "?" + new URLSearchParams({
    username: username,
    password: password
  }))
  .then(res => res.json())
  .then(data => {

    if(data.status === "success"){

      showMsg("Login Successful","success");

      // ✅ IMPORTANT FIX (MATCH INSTALL.HTML)
      localStorage.setItem("CURRENT_USER", JSON.stringify({
        n: data.user.name,          // name
        i: data.user.installation,  // installation
        admin: data.user.admin
      }));

      setTimeout(()=>{
        window.location.href = "Install.html";
      },500);

    }else{
      showMsg(data.message || "Login Failed","error");
    }

  })
  .catch(err=>{
    console.error(err);
    showMsg("Server Error","error");
  });
}

// ========= MESSAGE =========
function showMsg(text,type){
  let msg = document.getElementById("msg");
  msg.innerText = text;
  msg.className = type;
}

</script>

</body>
</html>
