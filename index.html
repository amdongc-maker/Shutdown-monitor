<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POWER SHUTDOWN MANAGEMENT APP - AREA-IV</title>

<style>
/* ===== GLOBAL ===== */
body{
  font-family:"Segoe UI",Roboto,Arial;
  background:#f1f3f6;
  margin:0;
}

/* ===== HEADER ===== */
header{
  background:#1f3a5f;
  color:#fff;
  padding:14px 18px;
  font-size:18px;
  font-weight:600;
  text-align:center;
}

/* ===== CONTAINER ===== */
.container{
  max-width:420px;
  margin:auto;
  padding:16px;
}

/* ===== CARD ===== */
.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

/* ===== HEADINGS ===== */
h2{
  font-size:16px;
  color:#1f3a5f;
  text-align:center;
}
h3{
  font-size:15px;
  color:#1f3a5f;
  text-align:center;
  margin-bottom:10px;
}

/* ===== INPUTS ===== */
input,
select,
textarea{
  width:100%;
  height:48px;
  padding:0 14px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #cfd1d4;
  font-size:15px;
  box-sizing:border-box;
  outline:none;
  transition:0.2s;
}

textarea{
  height:90px;
  padding:10px 14px;
  resize:none;
}

/* FOCUS */
input:focus,
select:focus,
textarea:focus{
  border-color:#1f3a5f;
  box-shadow:0 0 0 2px rgba(31,58,95,0.1);
}

/* ===== BUTTON ===== */
button{
  width:100%;
  height:50px;
  margin-top:14px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  background:#1f3a5f;color:#fff;
}

/* BUTTON COLORS */
.btn-login{background:#1f3a5f;color:#fff;}
.btn-login:hover{background:#16304d;}


/* ===== MESSAGE ===== */
#msg{
  text-align:center;
  margin-top:10px;
  font-weight:600;
  color: red; 
}
</style>
</head>

<body>
<header>POWER SHUTDOWN MANAGEMENT APP - AREA-IV</header>
  <div style="font-size:15px;font-weight:700;color:#1f3a5f" id="ui_name"></div>
  <div style="font-size:13px;color:#6b7280" id="ui_inst"></div>
</div>

<div class="container">

<div class="card" id="loginBox">

<!-- ONGC LOGO -->
<div style="text-align:center;margin-bottom:12px;">
  <img 
    src="Logo.png"
    alt="ONGC Logo"
    style="
      width:120px;
      background:#fff;
      padding:8px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,.15);
    ">
</div>
<div class="card">
  <h2>🔐 USER LOGIN</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">LOGIN</button>

  <div id="msg"></div>
</div>
<script>

// 🔴 YOUR WEB APP URL
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbypZ2rk0WUVi5Otfv5HSx8xHkvuxRO_4PpzruP8hi7JbGa2PWi9SvTBQ1IHTHF1cgu9mA/exec";

// ========= LOGIN =========
function login(){

  let username = document.getElementById("username").value.trim();
  let password = document.getElementById("password").value.trim();

  if(!username || !password){
    showMsg("Enter Username & Password","error");
    return;
  }

  showMsg("Checking...","");

  fetch(WEBAPP_URL + "?" + new URLSearchParams({
    username: username,
    password: password
  }))
  .then(res => res.json())
  .then(data => {

    if(data.status === "success"){

      showMsg("Login Successful","success");

      // ✅ IMPORTANT FIX (MATCH INSTALL.HTML)
      localStorage.setItem("CURRENT_USER", JSON.stringify({
        n: data.user.name,          // name
        i: data.user.installation,  // installation
        admin: data.user.admin 
      }));

      setTimeout(()=>{
        window.location.href = "Install.html";
      },500);

    }else{
      showMsg(data.message || "Login Failed","error");
    }

  })
  .catch(err=>{
    console.error(err);
    showMsg("Server Error","error");
  });
}

// ========= MESSAGE =========
function showMsg(text,type){
  let msg = document.getElementById("msg");
  msg.innerText = text;
  msg.className = type;
}

</script>

</body>
</html>
